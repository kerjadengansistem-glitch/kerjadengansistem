name: Sync Learning Pages

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-learning-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main site repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync learning pages from published articles
        run: |
          python3 scripts/sync_learning_pages.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html belajar/*.html scripts/sync_learning_pages.py .github/workflows/sync-learning-pages.yml
          git diff --cached --quiet && exit 0
          git commit -m "Auto sync learning pages"
          git push
